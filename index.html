<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拼音大挑戰 - 官方規則版</title>
    <style>
        :root {
            --primary: #4a90e2;
            --success: #2ecc71;
            --danger: #e74c3c;
            --warning: #f39c12;
            --bg: #f8fbff;
            --dark: #2c3e50;
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: "Microsoft JhengHei", "源泉圓體", sans-serif;
            background-color: var(--bg);
            overflow: hidden; display: flex; flex-direction: column;
        }

        /* 第一面：規則與設定 */
        #setup-overlay {
            position: fixed; inset: 0; background: var(--bg); z-index: 3000;
            display: flex; justify-content: center; align-items: center;
        }

        .setup-card {
            width: 90%; max-width: 850px; padding: 40px;
            background: white; border-radius: 35px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            display: grid; grid-template-columns: 1.2fr 1fr; gap: 30px;
        }

        .rules-section { text-align: left; border-right: 2px solid #f0f0f0; padding-right: 30px; }
        .rules-section h2 { color: var(--primary); margin-top: 0; border-left: 5px solid var(--primary); padding-left: 15px; }
        .rule-item { margin-bottom: 15px; font-size: 1.05rem; line-height: 1.6; color: var(--dark); }
        .rule-item b { color: var(--danger); }

        .setup-section h2 { color: var(--dark); margin-top: 0; }
        .group-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .group-inputs input { padding: 12px; border-radius: 10px; border: 2px solid #ddd; outline: none; transition: 0.3s; }
        .group-inputs input:focus { border-color: var(--primary); }

        /* 遊戲核心舞台 */
        .game-stage {
            flex: 1; display: flex; flex-direction: column;
            justify-content: center; align-items: center; padding: 20px;
        }

        #timer { font-size: 5rem; font-weight: 900; color: var(--danger); margin-bottom: 10px; }

        #pinyin-card {
            width: 90%; max-width: 800px; height: 320px;
            background: white; border: 8px solid var(--dark); border-radius: 40px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1); cursor: pointer; transition: 0.3s;
        }

        .display-pinyin { font-size: 5.5rem; color: var(--dark); font-weight: bold; }
        .display-word { font-size: 7.5rem; color: var(--primary); display: none; letter-spacing: 15px; font-weight: bold; }

        .btn-group { margin-top: 35px; display: flex; gap: 20px; }
        .btn { padding: 18px 45px; font-size: 1.6rem; border-radius: 20px; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-success { background: var(--success); color: white; box-shadow: 0 6px 0 #27ae60; }
        .btn-redo { background: #bdc3c7; color: white; box-shadow: 0 6px 0 #95a5a6; }
        .btn-next { background: var(--primary); color: white; box-shadow: 0 6px 0 #2980b9; }
        .btn:active { transform: translateY(4px); box-shadow: none; }

        /* 底部動態積分牆 */
        .bottom-scoreboard {
            height: 200px; background: white; 
            display: flex; justify-content: center; align-items: flex-end;
            padding: 20px 40px; gap: 15px; border-top: 3px solid #eee;
        }

        .score-column {
            flex: 1; max-width: 180px; height: 100%; 
            display: flex; flex-direction: column; align-items: center; transition: 0.3s;
        }

        .active-indicator { font-size: 1.5rem; height: 30px; opacity: 0; color: var(--danger); }
        .score-column.active .active-indicator { opacity: 1; animation: bounce 0.6s infinite alternate; }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-8px); } }

        .score-val { font-weight: 900; color: var(--primary); font-size: 1.6rem; margin-bottom: 5px; }

        .tube-outer {
            width: 70%; height: 80px; background: #f0f0f0; border-radius: 12px 12px 0 0;
            position: relative; overflow: hidden; border: 2px solid #ddd; border-bottom: none;
        }

        .tube-fill {
            position: absolute; bottom: 0; width: 100%;
            background: linear-gradient(to top, var(--primary), #82c0ff);
            transition: height 0.8s ease-out;
        }

        .group-label {
            width: 100%; background: var(--dark); color: white; padding: 10px 0;
            text-align: center; font-weight: bold; border-radius: 0 0 12px 12px; font-size: 1.1rem;
        }

        #summary-screen {
            position: fixed; inset: 0; background: white; z-index: 4000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
    </style>
</head>
<body>

    <!-- 第一面：規則與分組 -->
    <div id="setup-overlay">
        <div class="setup-card">
            <div class="rules-section">
                <h2>📜 遊戲規則</h2>
                <div class="rule-item"><b>1.</b> 看拼音，精確讀出詞語。</div>
                <div class="rule-item"><b>2.</b> 小組合作，需在 <b>15 秒內</b> 讀出詞語並<b>口頭造一個句子</b>。</div>
                <div class="rule-item"><b>3.</b> 發音準確且句子通順得 <b>10 分</b>，否則由下一組<b>補答</b>。</div>
                <div style="margin-top: 30px; font-size: 0.9rem; color: #888;">* 點擊卡片可切換拼音/漢字對照</div>
            </div>
            <div class="setup-section">
                <h2>👥 分組設定</h2>
                <div class="group-inputs">
                    <input type="text" id="g1" placeholder="第一組名稱">
                    <input type="text" id="g2" placeholder="第二組名稱">
                    <input type="text" id="g3" placeholder="第三組名稱">
                    <input type="text" id="g4" placeholder="第四組名稱">
                    <input type="text" id="g5" placeholder="第五組名稱">
                    <input type="text" id="g6" placeholder="第六組名稱">
                </div>
                <button class="btn btn-next" style="width: 100%;" onclick="initGame()">開始比賽</button>
            </div>
        </div>
    </div>

    <!-- 遊戲主舞台 -->
    <div class="game-stage">
        <div id="timer">15</div>
        <div id="pinyin-card" onclick="toggleFlip()">
            <div class="display-pinyin" id="txt-pinyin">準備</div>
            <div class="display-word" id="txt-word">GO!</div>
        </div>
        <div class="btn-group">
            <button class="btn btn-redo" onclick="handleRedo()">補答</button>
            <button class="btn btn-success" id="btn-score" onclick="handleSuccess()" disabled>正確得分</button>
            <button class="btn btn-next" onclick="nextRound()">下一題</button>
        </div>
    </div>

    <!-- 底部積分牆 -->
    <div class="bottom-scoreboard" id="scoreboard"></div>

    <!-- 結算畫面 -->
    <div id="summary-screen" style="display:none">
        <h2 style="margin-bottom:10px">📖 本課拼音匯總</h2>
        <div id="summary-content" style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; width: 90%; max-height: 400px; overflow-y: auto; padding: 20px; background: #f4f4f4; border-radius: 20px; margin-bottom: 20px;"></div>
        <h1 id="winner-text" style="color:var(--danger)"></h1>
        <button class="btn btn-next" onclick="location.reload()">重新開始</button>
    </div>

    <audio id="s-ding" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"></audio>
    <audio id="s-tick" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"></audio>

    <script>
        const quizData = [
            {p: "fēng zheng", w: "風箏"}, {p: "cāng ying", w: "蒼蠅"}, {p: "duàn liàn", w: "鍛煉"},
            {p: "fēn fāng", w: "芬芳"}, {p: "gōng chéng shī", w: "工程師"}, {p: "guǎng chǎng", w: "廣場"},
            {p: "héng xīng", w: "恆星"}, {p: "jiàn zhuàng", w: "健壯"}, {p: "kǒng què", w: "孔雀"},
            {p: "pēng rèn", w: "烹飪"}, {p: "lùn wén", w: "論文"}, {p: "mìng yùn", w: "命運"},
            {p: "níng méng", w: "檸檬"}, {p: "lán gān", w: "欄杆"}, {p: "líng dang", w: "鈴鐺"},
            {p: "zhēn xī", w: "珍惜"}, {p: "gēng xīn", w: "更新"}, {p: "dān xīn", w: "擔心"},
            {p: "chuāng shāng", w: "創傷"}, {p: "fēng shuāng", w: "風霜"}, {p: "bīng shuāng", w: "冰霜"},
            {p: "jīn yú", w: "金魚"}, {p: "kěn dìng", w: "肯定"}, {p: "tíng zhǐ", w: "停止"},
            {p: "wén míng", w: "文明"}, {p: "wán jié", w: "完結"}, {p: "sēn lín", w: "森林"},
            {p: "qīng xǐng", w: "清醒"}, {p: "jǐn zhāng", w: "緊張"}, {p: "píng ān", w: "平安"}
        ];

        let groups = [];
        let groupQueue = [];
        let currentIndex = -1;
        let timer;
        let activeIdx = -1;

        function initGame() {
            for(let i=1; i<=6; i++) {
                let n = document.getElementById(`g${i}`).value.trim();
                if(n) groups.push({ name: n, score: 0, id: i });
            }
            if(!groups.length) return alert("請輸入至少一個小組名稱！");
            document.getElementById('setup-overlay').style.display = 'none';
            renderScoreboard();
            nextRound();
        }

        function renderScoreboard() {
            const sb = document.getElementById('scoreboard');
            sb.innerHTML = groups.map((g, idx) => `
                <div class="score-column" id="col-${idx}">
                    <div class="active-indicator">▼</div>
                    <div class="score-val" id="val-${idx}">${g.score}</div>
                    <div class="tube-outer">
                        <div class="tube-fill" id="fill-${idx}" style="height: 0%"></div>
                    </div>
                    <div class="group-label">${g.name}</div>
                </div>
            `).join('');
        }

        function updateScores() {
            groups.forEach((g, idx) => {
                document.getElementById(`val-${idx}`).innerText = g.score;
                document.getElementById(`fill-${idx}`).style.height = Math.min(g.score, 100) + "%";
                document.getElementById(`col-${idx}`).classList.toggle('active', idx === activeIdx);
            });
        }

        function nextRound() {
            currentIndex++;
            if(currentIndex >= quizData.length) return showSummary();
            if(!groupQueue.length) groupQueue = groups.map((_, i) => i).sort(() => Math.random() - 0.5);
            
            activeIdx = groupQueue.pop();
            document.getElementById('txt-pinyin').innerText = quizData[currentIndex].p;
            document.getElementById('txt-word').innerText = quizData[currentIndex].w;
            document.getElementById('txt-pinyin').style.display = 'block';
            document.getElementById('txt-word').style.display = 'none';
            document.getElementById('btn-score').disabled = false;
            
            updateScores();
            startTimer();
        }

        function startTimer() {
            clearInterval(timer);
            let left = 15;
            document.getElementById('timer').innerText = left;
            timer = setInterval(() => {
                left--;
                document.getElementById('timer').innerText = left;
                if(left <= 3 && left > 0) document.getElementById('s-tick').play();
                if(left <= 0) { 
                    clearInterval(timer); 
                    document.getElementById('s-ding').play();
                    document.getElementById('btn-score').disabled = true;
                }
            }, 1000);
        }

        function toggleFlip() {
            const w = document.getElementById('txt-word');
            const p = document.getElementById('txt-pinyin');
            const isH = (w.style.display === 'none');
            w.style.display = isH ? 'block' : 'none';
            p.style.display = isH ? 'none' : 'block';
        }

        function handleSuccess() {
            clearInterval(timer);
            groups[activeIdx].score += 10;
            document.getElementById('s-ding').play();
            if(document.getElementById('txt-word').style.display === 'none') toggleFlip();
            updateScores();
            document.getElementById('btn-score').disabled = true;
        }

        function handleRedo() {
            clearInterval(timer);
            document.getElementById('s-ding').play();
            // 補答邏輯：通常是手動判定，這裡僅停止計時
        }

        function showSummary() {
            clearInterval(timer);
            document.getElementById('summary-screen').style.display = 'flex';
            document.getElementById('summary-content').innerHTML = quizData.map(d => `<div style="background:white; padding:10px; border-radius:10px; border:1px solid #ddd; text-align:center;"><b>${d.p}</b><br>${d.w}</div>`).join('');
            const winner = [...groups].sort((a,b) => b.score - a.score)[0];
            document.getElementById('winner-text').innerText = `🏆 冠軍：${winner.name} (${winner.score}分)`;
        }
    </script>
</body>
</html>
